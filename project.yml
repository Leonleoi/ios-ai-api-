name: AI_Chat
options:
  bundleIdPrefix: com.aichat
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.4"

settings:
  base:
    SWIFT_VERSION: "6.0"
    TARGETED_DEVICE_FAMILY: "1"
    INFOPLIST_FILE: AI_Chat/Info.plist
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "Apple Development"

targets:
  AI_Chat:
    type: application
    platform: iOS
    sources:
      - path: AI_Chat
    info:
      path: AI_Chat/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aichat.app
